name: Auto Update JSON Every Minute

on:
  schedule:
    # 提示：GitHub 规定最快约 5-10 分钟执行一次，无法真正做到严格的每 1 分钟
    - cron: '*/1 * * * *'
  workflow_dispatch: # 允许你在 GitHub 页面上手动点击运行测试

permissions:
  contents: write # 赋予工作流向仓库推送代码的权限

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出仓库代码
        uses: actions/checkout@v4

      - name: 2. 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 3. 运行 Python 脚本
        run: |
          python 01.py

      - name: 4. 提交并推送到仓库
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 配置 Git 机器人信息
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          
          # 检查是否有文件变动
          git add 01.json
          if git diff --staged --quiet; then
            echo "没有检测到文件变化，跳过提交。"
          else
            git commit -m "自动更新: 01.json 时间戳"
            git push
          fi
