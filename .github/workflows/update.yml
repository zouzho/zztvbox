name: Auto Update JSON Every Minute

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch: 

permissions:
  contents: write 

# 核心修复：在这里加入全局环境变量，强制工作流内部的 Action 使用 Node 24 运行
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出仓库代码
        uses: actions/checkout@v4

      - name: 2. 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 3. 运行 Python 脚本
        run: |
          python update.py

      - name: 4. 提交并推送到仓库
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          
          git add 01.json
          if git diff --staged --quiet; then
            echo "没有检测到文件变化，跳过提交。"
          else
            git commit -m "自动更新: 01.json 时间戳"
            git push
          fi
